<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bnnuy Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: url('bg.png') center center fixed;
            background-size: cover;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(5, 200px);
            gap: 1rem;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery img {
            width: 200px;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: white;
            padding: 0.5rem;
        }

        @media (max-width: 1200px) {
            .gallery {
                grid-template-columns: repeat(4, 200px);
            }
        }

        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(3, 200px);
            }
        }

        @media (max-width: 700px) {
            .gallery {
                grid-template-columns: repeat(2, 200px);
            }
        }

        @media (max-width: 500px) {
            .gallery {
                grid-template-columns: repeat(1, 200px);
            }
        }
    </style>
</head>
<body>
    <h1>🐇</h1>
    <div class="gallery">
        <img src="b/1.gif" alt="Bunny 1">
        <img src="b/2.gif" alt="Bunny 2">
        <img src="b/3.gif" alt="Bunny 3">
        <img src="b/4.gif" alt="Bunny 4">
        <img src="b/5.gif" alt="Bunny 5">
        <img src="b/6.gif" alt="Bunny 6">
        <img src="b/7.gif" alt="Bunny 7">
        <img src="b/8.gif" alt="Bunny 8">
        <img src="b/9.gif" alt="Bunny 9">
        <img src="b/10.gif" alt="Bunny 10">
    </div>
</body>
</html>
