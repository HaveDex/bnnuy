<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bnnuy Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(5, 200px);
            gap: 1rem;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery img {
            width: 200px;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: white;
            padding: 0.5rem;
        }

        .loading {
            text-align: center;
            color: #666;
            margin-top: 2rem;
        }

        @media (max-width: 1200px) {
            .gallery {
                grid-template-columns: repeat(4, 200px);
            }
        }

        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(3, 200px);
            }
        }

        @media (max-width: 700px) {
            .gallery {
                grid-template-columns: repeat(2, 200px);
            }
        }

        @media (max-width: 500px) {
            .gallery {
                grid-template-columns: repeat(1, 200px);
            }
        }
    </style>
</head>
<body>
    <h1>🐰 Bnnuy Gallery 🐰</h1>
    <div class="gallery" id="gallery"></div>
    <div class="loading" id="loading">Loading bunnies...</div>

    <script>
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('loading');
        
        // Change this to your GitHub raw content URL
        // Format: https://raw.githubusercontent.com/USERNAME/REPO/main/
        const baseURL = 'https://raw.githubusercontent.com/USERNAME/REPO/main/';
        
        async function loadImages() {
            let loadedCount = 0;
            
            for (let i = 1; i <= 999; i++) {
                // Try both .gif and .png extensions
                const extensions = ['gif', 'png', 'jpg', 'jpeg'];
                
                for (const ext of extensions) {
                    const url = `${baseURL}${i}-*.${ext}`;
                    
                    // Try to load the image
                    const img = new Image();
                    img.onload = function() {
                        const imgElement = document.createElement('img');
                        imgElement.src = this.src;
                        imgElement.alt = `Bunny ${i}`;
                        gallery.appendChild(imgElement);
                        loadedCount++;
                        updateLoadingText(loadedCount);
                    };
                    img.onerror = function() {
                        // Image doesn't exist, skip
                    };
                    
                    // Try common naming patterns
                    const patterns = [
                        `${i}-bunny.${ext}`,
                        `${i}-rabbit.${ext}`,
                        `${i}-bnnuy.${ext}`,
                        `${i}.${ext}`
                    ];
                    
                    for (const pattern of patterns) {
                        img.src = baseURL + pattern;
                        await new Promise(resolve => setTimeout(resolve, 50));
                    }
                }
            }
            
            setTimeout(() => {
                if (loadedCount === 0) {
                    loading.textContent = 'No bunnies found. Make sure to update the baseURL in the script!';
                } else {
                    loading.style.display = 'none';
                }
            }, 3000);
        }
        
        function updateLoadingText(count) {
            loading.textContent = `Loaded ${count} bunnies...`;
        }
        
        loadImages();
    </script>
</body>
</html>
