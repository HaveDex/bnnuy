<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bnnuy Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(5, 200px);
            gap: 1rem;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery img {
            width: 200px;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: white;
            padding: 0.5rem;
        }

        .loading {
            text-align: center;
            color: #666;
            margin-top: 2rem;
        }

        @media (max-width: 1200px) {
            .gallery {
                grid-template-columns: repeat(4, 200px);
            }
        }

        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(3, 200px);
            }
        }

        @media (max-width: 700px) {
            .gallery {
                grid-template-columns: repeat(2, 200px);
            }
        }

        @media (max-width: 500px) {
            .gallery {
                grid-template-columns: repeat(1, 200px);
            }
        }
    </style>
</head>
<body>
    <h1>🐇</h1>
    <div class="gallery" id="gallery"></div>
    <div class="loading" id="loading">Loading bunnies...</div>

    <script>
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('loading');
        
        // Change this to your GitHub raw content URL
        // Format: https://raw.githubusercontent.com/USERNAME/REPO/main/
        const baseURL = 'https://raw.githubusercontent.com/HaveDex/bnnuy/main/';
        
        async function loadImages() {
            let loadedCount = 0;
            let consecutiveFails = 0;
            
            for (let i = 1; i <= 999; i++) {
                // If we've had 5 consecutive failures, assume we've reached the end
                if (consecutiveFails >= 5) {
                    break;
                }
                
                const extensions = ['gif', 'png', 'jpg', 'jpeg'];
                let found = false;
                
                for (const ext of extensions) {
                    const url = `${baseURL}bunny ${i}.${ext}`;
                    
                    try {
                        const response = await fetch(url, { method: 'HEAD' });
                        if (response.ok) {
                            const imgElement = document.createElement('img');
                            imgElement.src = url;
                            imgElement.alt = `Bunny ${i}`;
                            gallery.appendChild(imgElement);
                            loadedCount++;
                            consecutiveFails = 0;
                            found = true;
                            updateLoadingText(loadedCount);
                            break;
                        }
                    } catch (e) {
                        // File doesn't exist, try next extension
                    }
                }
                
                if (!found) {
                    consecutiveFails++;
                }
            }
            
            if (loadedCount === 0) {
                loading.textContent = 'No bunnies found. Make sure to update the baseURL in the script!';
            } else {
                loading.textContent = `Loaded ${loadedCount} bunnies! 🐰`;
            }
        }
        
        function updateLoadingText(count) {
            loading.textContent = `Loading bunnies... (${count} found so far)`;
        }
        
        loadImages();
    </script>
</body>
</html>
